# Curated model registry. Resolved at runtime by models.py — backends list
# only the entries whose files actually exist on disk. The bringup script
# (kyleengza/pi-bringup → scripts/pi-bringup-inference.sh) installs the
# Hailo .hef files via the apt `hailo-models` package and fetches the CPU
# .onnx files into /var/cache/usb-rtsp/inference-models/.

hailo:
  # _h8 variants compiled for the full Hailo-8 device (26 TOPS); _h8l
  # variants run too but at reduced perf with a runtime warning.
  yolov8s:
    hef: /usr/share/hailo-models/yolov8s_h8.hef
    post_so: /usr/lib/aarch64-linux-gnu/hailo/tappas/post_processes/libyolo_hailortpp_post.so
    labels: coco
    fps_target: 30
  yolov6n:
    hef: /usr/share/hailo-models/yolov6n_h8.hef
    post_so: /usr/lib/aarch64-linux-gnu/hailo/tappas/post_processes/libyolo_hailortpp_post.so
    labels: coco
    fps_target: 30

cpu:
  yolov8n:
    onnx: /var/cache/usb-rtsp/inference-models/yolov8n.onnx
    labels: coco
    fps_target: 8
  yolov8s:
    onnx: /var/cache/usb-rtsp/inference-models/yolov8s.onnx
    labels: coco
    fps_target: 5

labels:
