# Curated model registry. Resolved at runtime by models.py — backends list
# only the entries whose files actually exist on disk.
#
# Hailo HEFs:
#   - apt `hailo-models` package ships under /usr/share/hailo-models/
#     (h8 + h8l variants). _h8 = compiled for full Hailo-8 (26 TOPS);
#     _h8l = Hailo-8L (13 TOPS) — runs on h8 at reduced perf.
#   - Larger HEFs not in apt are fetched by pi-bringup-inference.sh into
#     ~/.cache/usb-rtsp/inference-models/ from Hailo's public Model Zoo
#     mirror (https://hailo-csdata.s3.eu-west-2.amazonaws.com/...).
#
# CPU ONNX models: fetched by the same bringup script into the same
# ~/.cache/usb-rtsp/inference-models/ directory.

hailo:
  # yolov8m: ~26M params, listed first so new-job UX defaults to it.
  # Bigger than yolov8s; ~2-3x more Hailo bandwidth per inference but
  # noticeably more accurate on COCO. Fetched by bringup.
  yolov8m:
    hef: ~/.cache/usb-rtsp/inference-models/yolov8m_h8.hef
    post_so: /usr/lib/aarch64-linux-gnu/hailo/tappas/post_processes/libyolo_hailortpp_post.so
    labels: coco
    fps_target: 30
  yolov8s:
    hef: /usr/share/hailo-models/yolov8s_h8.hef
    post_so: /usr/lib/aarch64-linux-gnu/hailo/tappas/post_processes/libyolo_hailortpp_post.so
    labels: coco
    fps_target: 30
  yolov6n:
    hef: /usr/share/hailo-models/yolov6n_h8.hef
    post_so: /usr/lib/aarch64-linux-gnu/hailo/tappas/post_processes/libyolo_hailortpp_post.so
    labels: coco
    fps_target: 30

cpu:
  # YOLO11 (Ultralytics' next-gen — same COCO 80 + same (1,84,8400)
  # output head as YOLOv8, so backend_cpu's decoder is unchanged).
  # Fetched by pi-bringup from
  # https://github.com/ultralytics/assets/releases/download/v8.4.0/...
  yolo11n:
    onnx: ~/.cache/usb-rtsp/inference-models/yolo11n.onnx
    labels: coco
    fps_target: 8
  yolo11s:
    onnx: ~/.cache/usb-rtsp/inference-models/yolo11s.onnx
    labels: coco
    fps_target: 5

